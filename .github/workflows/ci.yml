name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Restore
        run: dotnet restore Cedroid.slnx

      - name: Build
        run: dotnet build Cedroid.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Cedroid.slnx --no-build --configuration Release --logger "trx;LogFileName=tests.trx"

  format:
    name: Verify formatting
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Restore
        run: dotnet restore Cedroid.slnx

      - name: Verify formatting
        run: dotnet format Cedroid.slnx --verify-no-changes --no-restore
